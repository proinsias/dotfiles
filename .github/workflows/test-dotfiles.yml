---
# Based on https://github.com/geerlingguy/mac-dev-playbook/blob/master/.github/workflows/ci.yml.

######################################################################
## minute         0-59
## hour           0-23
## day of month   1-31
## month          1-12
## day of week    0-7
######################################################################

name: Test Chezmoi Dotfiles
on:
  pull_request:
    branches: [main]
  # push:
  #   branches: [main]
  schedule:
    - cron: 1 2 * * 4
  # Run workflow manually (without waiting for the cron to be called),
  # through the Github Actions Workflow page directly.
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # FIXME:
        # os: [ubuntu-latest, macos-latest]
        # shell: [bash, zsh]
        os: [macos-latest]
        shell: [zsh]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew upgrade bash bats-core 2>/dev/null || brew install bash bats-core
          else
            sudo apt-get update && sudo apt-get install -y bats
          fi

      - name: Debug environment
        run: |
          echo "=== bash version ==="
          bash --version
          echo "=== bats version ==="
          bats --version
          echo "=== which bash ==="
          which bash
          echo "=== PATH ==="
          echo "${PATH}"

      - name: Run bats tests
        run: bats --print-output-on-failure tests/bats/

      - name: Setup temporary HOME and copy blank config
        continue-on-error: true
        run: |
          mkdir -p "${TEST_HOME}/.config/chezmoi"
          # Use template file with defaults.
          cp -f chezmoi/.test.chezmoi.toml chezmoi/.chezmoi.toml.tmpl
          # Provide empty age key.
          mkdir -p "${HOME}"/.config/chezmoi
          touch "${HOME}"/.config/chezmoi/key.txt
        env:
          TEST_HOME: ${{ runner.temp }}/testhome

      - name: Install chezmoi and fake op
        continue-on-error: true
        run: |
          curl -fsSL https://get.chezmoi.io | sh -s -- -b "${TEST_HOME}/bin"
          cp "$(pwd)"/bin/op "${TEST_HOME}/bin/op"
          echo "${TEST_HOME}/bin" >> "${GITHUB_PATH}"
        env:
          TEST_HOME: ${{ runner.temp }}/testhome

      - name: Initialize chezmoi
        continue-on-error: true
        run: |
          chezmoi init --source="$(pwd)" --destination="${TEST_HOME}" \
              --keep-going --no-tty # --promptDefaults
        env:
          TEST_HOME: ${{ runner.temp }}/testhome

      - name: Apply dotfiles into temp home
        continue-on-error: true
        run: |
          chezmoi apply --source="$(pwd)" --destination="${TEST_HOME}" \
              --keep-going --no-tty --exclude encrypted,scripts

      - name: Verify dotfiles consistency
        continue-on-error: true
        run: |
          chezmoi verify --source="$(pwd)" --destination="${TEST_HOME}" \
              --keep-going --no-tty --exclude encrypted

      - name: Run chezmoi doctor
        continue-on-error: true
        run: |
          chezmoi doctor --source="$(pwd)" --destination="${TEST_HOME}" \
              --keep-going --no-tty

      - name: Smoke test shell startup
        continue-on-error: true
        run: |
          echo "--- Running smoke test for ${{ matrix.shell }} ---"
          if [ "${{ matrix.shell }}" = "zsh" ]; then
            # Some runners don't have zsh preinstalled
            if ! command -v zsh >/dev/null; then
              echo "Installing zsh..."
              if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
                sudo apt-get update && sudo apt-get install -y zsh
              else
                brew install zsh
              fi
            fi
            ZDOTDIR="${TEST_HOME}" HOME="${TEST_HOME}" zsh -i -c 'echo "zsh ${ZSH_VERSION}"; alias | head -n 10'
          else
            HOME="${TEST_HOME}" bash -i -c 'echo "bash ${BASH_VERSION}"; alias | head -n 10'
          fi
        shell: bash
        env:
          TEST_HOME: ${{ runner.temp }}/testhome
